name: Markdownlint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  markdownlint:
    name: Lint Markdown files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            **/*.md
            !node_modules
